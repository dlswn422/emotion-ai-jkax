name: Batch - Monthly (30D)

on:
  schedule:
    - cron: '0 17 28-31 * *'
  workflow_dispatch:
# 서버 꺠우기(슬립 방지)
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server
        run: |
          echo "서버 웜업 시작..."
          for i in {1..6}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.BACKEND_URL }}/batch/status?secret=${{ secrets.BATCH_SECRET }}")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "서버 준비 완료"
              break
            fi
            echo "대기 중... (15초)"
            sleep 15
          done

      - name: Trigger monthly batch
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.BACKEND_URL }}/batch/trigger/monthly?secret=${{ secrets.BATCH_SECRET }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "배치 트리거 실패: $status"
            exit 1
          fi
