name: Batch - Monthly (30D)

on:
  schedule:
    - cron: '0 17 28-31 * *'  # 매월 28~31일 UTC 17:00 실행, 말일 여부는 백엔드에서 검증
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly batch
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.BACKEND_URL }}/batch/trigger/monthly?secret=${{ secrets.BATCH_SECRET }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status, Body: $body"
          if [ "$status" != "200" ]; then
            echo "Batch trigger failed with status $status"
            exit 1
          fi