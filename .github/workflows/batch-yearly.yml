name: Batch - Yearly (180D, 365D)

on:
  schedule:
    - cron: '0 17 31 12 *'   # 12/31 UTC 17:00 = KST 02:00
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger yearly batch
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.BACKEND_URL }}/batch/trigger/yearly?secret=${{ secrets.BATCH_SECRET }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status, Body: $body"
          if [ "$status" != "200" ]; then
            echo "Batch trigger failed with status $status"
            exit 1
          fi
